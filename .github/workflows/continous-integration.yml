name: ⚙️ Continuous Integration

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  checks:
    name: 🧪 Rust checks on ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, beta, nightly]
    steps:
      - name: 🔍 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Rust ${{ matrix.toolchain }}
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ matrix.toolchain }}
          override: true

      - name: 📦 Cache cargo registry and index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ matrix.toolchain }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ matrix.toolchain }}-${{ runner.os }}-

      - name: 🏗️ Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ matrix.toolchain }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ matrix.toolchain }}-${{ runner.os }}-

      - name: 🎨 Check formatting
        run: cargo fmt -- --check

      - name: 🔍 Clippy lints
        run: cargo clippy -- -D warnings

      - name: ✅ Run tests
        run: cargo test --locked --verbose

  audit:
    name: 🔐 Security audit
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: 🔍 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: 📦 Install cargo-audit
        run: cargo install cargo-audit

      - name: 🕵️‍♂️ Run cargo audit
        run: cargo audit

  release_build:
    name: 🚀 Build release artifact
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: 🔍 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: 📦 Cache cargo registry and index (release)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: release-cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-cargo-registry-${{ runner.os }}-

      - name: 🏗️ Build release
        run: cargo build --release

      - name: 📤 Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: release-binary
          path: target/release/
